/* ============ Date helpers ============ */

const prettyDate = (key) => {
  const d = new Date(key + "T00:00:00");
  return d.toLocaleDateString("en-IN", { weekday: "short", day: "numeric", month: "short" });
};
const addDays = (key, n) => { const d = new Date(key + "T00:00:00"); d.setDate(d.getDate() + n); return todayKey(d); };
const uid = () => (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2));
const initials = (name) => (name || "?").trim().split(/\s+/).slice(0,2).map(w => w[0]?.toUpperCase()).join("");

/* ============ WhatsApp text parser ============ */
function parseWhatsAppText(raw) {
  const lines = raw.split(/\r?\n/)
    .map(l => l.replace(/^\[?\d{1,2}\/\d{1,2}\/\d{2,4},?\s?\d{1,2}:\d{2}.*?\]?\s?-?\s?.*?:\s?/i, ""))
    .map(l => l.trim())
    .filter(l => l.length > 0 && !/^(good morning|gm|please do|regards|thank you|thanks)$/i.test(l));
  const items = [];
  for (const line of lines) {
    const match = line.match(/^([A-Za-z][A-Za-z .]{1,20}?)\s*[:\-–]\s*(.+)$/);
    if (match) {
      const rawSubject = match[1].trim();
      const found = KNOWN_SUBJECTS.find(s =>
        s.toLowerCase() === rawSubject.toLowerCase() ||
        (s === "SST" && /social/i.test(rawSubject)) ||
        (s === "Maths" && /math/i.test(rawSubject))
      );
      items.push({ subject: found || "General", text: match[2].trim() });
    } else {
      items.push({ subject: "General", text: line });
    }
  }
  return items;
}

/* ============ File helpers ============ */
const ACCEPTED_FILE_TYPES = ".jpg,.jpeg,.png,.gif,.webp,.pdf,.doc,.docx,.xls,.xlsx,.csv";
const MAX_FILE_MB = 8;
function fileKind(type, name) {
  if (type.startsWith("image/")) return "image";
  if (/\.(xlsx|xls|csv)$/i.test(name)) return "excel";
  if (/\.(doc|docx)$/i.test(name)) return "doc";
  if (/\.pdf$/i.test(name)) return "pdf";
  return "file";
}
function fileBadgeColor(kind) {
  return { image: "#E1F3EC", excel: "#E1F3EC", doc: "#E4EEF7", pdf: "#FDECE3", file: "#EDEFEF" }[kind] || "#EDEFEF";
}
function fileBadgeLabel(kind) {
  return { image: "IMG", excel: "XLS", doc: "DOC", pdf: "PDF", file: "FILE" }[kind] || "FILE";
}

/* ============ Local (device-only) storage fallback ============ */
function localLoad(key, fallback) {
  try { const raw = window.localStorage.getItem(`kavi-magi:${key}`); return raw ? JSON.parse(raw) : fallback; }
  catch { return fallback; }
}
function localSave(key, value) {
  try { window.localStorage.setItem(`kavi-magi:${key}`, JSON.stringify(value)); } catch (e) { console.error(e); }
}

/* ============ Firebase setup ============ */
const FIREBASE_READY = window.FIREBASE_CONFIG && window.FIREBASE_CONFIG.apiKey && !window.FIREBASE_CONFIG.apiKey.startsWith("PASTE_");
let fbApp, fbAuth, fbDb, fbStorage;
if (FIREBASE_READY) {
  fbApp = firebase.initializeApp(window.FIREBASE_CONFIG);
  fbAuth = firebase.auth();
  fbDb = firebase.firestore();
  fbStorage = firebase.storage();
}

function randomFamilyCode() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // no confusing chars (0/O, 1/I)
  let s = "";
  for (let i = 0; i < 6; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}

function Emblem({ size = 44 }) {
  return (
    <div className="rounded-full flex items-center justify-center shrink-0"

}
function Avatar({ name, size = 36, color, ring }) {
  return (
    <div className="rounded-full flex items-center justify-center shrink-0 font-display font-bold text-white"

/* ============================================================
   ROOT — decides Firebase vs local-only, then family-code gate
   ============================================================ */
function Root() {
  const [authReady, setAuthReady] = useState(!FIREBASE_READY);
  const [familyCode, setFamilyCode] = useState(() => localLoad("familyCode", null));

  useEffect(() => {
    if (!FIREBASE_READY) return;
    const unsub = fbAuth.onAuthStateChanged((user) => {
      if (user) { setAuthReady(true); }
      else { fbAuth.signInAnonymously().catch(err => { console.error(err); setAuthReady(true); }); }
    });
    return () => unsub();
  }, []);

  if (!authReady) {
    return <CenterLoading text="Connecting…" />;
  }

  if (FIREBASE_READY && !familyCode) {
    return <FamilyCodeGate onReady={(code) => { localSave("familyCode", code); setFamilyCode(code); }} />;
  }

  return <App familyCode={FIREBASE_READY ? familyCode : null}
              onChangeFamily={FIREBASE_READY ? () => { localSave("familyCode", null); setFamilyCode(null); } : null} />;
}

function CenterLoading({ text }) {
  return (
    <div className="min-h-screen flex items-center justify-center" style={{ background: PAPER }}>
      <div className="flex flex-col items-center gap-3">
        <Emblem size={52} />
        <p className="text-sm" style={{ color: MUTED }}>{text}</p>
      </div>
    </div>
  );
}

function FamilyCodeGate({ onReady }) {
  const [mode, setMode] = useState(null); // 'create' | 'join'
  const [inputCode, setInputCode] = useState("");
  const [newCode] = useState(() => randomFamilyCode());
  const [creating, setCreating] = useState(false);
  const [error, setError] = useState("");

  const createFamily = async () => {
    setCreating(true);
    try {
      await fbDb.collection("families").doc(newCode).set({
        profiles: [], entries: {}, createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      onReady(newCode);
    } catch (e) { console.error("Create family failed:", e); setError(`Could not create family — ${e.code || e.message || "check your Firebase setup"}.`); setCreating(false); }
  };

  const joinFamily = async () => {
    const code = inputCode.trim().toUpperCase();
    if (code.length < 4) { setError("Enter the 6-character code from the other device."); return; }
    setCreating(true);
    try {
      const doc = await fbDb.collection("families").doc(code).get();
      if (!doc.exists) { setError("No family found with that code. Check it and try again."); setCreating(false); return; }
      onReady(code);
    } catch (e) { console.error("Join family failed:", e); setError(`Something went wrong — ${e.code || e.message || "check your connection and try again"}.`); setCreating(false); }
  };

  return (
    <div className="min-h-screen flex items-center justify-center px-4" style={{ background: PAPER }}>
      <div className="bg-white rounded-2xl p-6 max-w-sm w-full" style={{ border: `1px solid ${LINE}` }}>
        <div className="flex justify-center mb-4"><Emblem size={56} /></div>
        <h1 className="font-display font-bold text-lg text-center mb-1" style={{ color: NAVY }}>Kavi &amp; Magi School Diary</h1>
        <p className="text-sm text-center mb-5" style={{ color: MUTED }}>
          Set up once, then open the same diary from any device.
        </p>

        {!mode && (
          <div className="flex flex-col gap-2.5">
            <button onClick={() => setMode("create")} className="w-full py-3.5 rounded-xl text-white font-display font-bold" style={{ background: NAVY }}>
              Start a new diary
            </button>
            <button onClick={() => setMode("join")} className="w-full py-3.5 rounded-xl font-display font-bold" style={{ background: "#E1F3EC", color: TEAL_DARK }}>
              I already have a family code
            </button>
          </div>
        )}

        {mode === "create" && (
          <div>
            <p className="text-xs mb-2" style={{ color: MUTED }}>This code links your devices together. Write it down or share it with the other device/phone:</p>
            <div className="text-center py-4 rounded-xl mb-4 font-display font-extrabold text-3xl tracking-[0.2em]" style={{ background: "#E1F3EC", color: TEAL_DARK }}>
              {newCode}
            </div>
            {error && <p className="text-xs mb-3" style={{ color: "#B7551E" }}>{error}</p>}
            <button disabled={creating} onClick={createFamily} className="w-full py-3.5 rounded-xl text-white font-display font-bold disabled:opacity-50" style={{ background: NAVY }}>
              {creating ? "Setting up…" : "Continue"}
            </button>
            <button onClick={() => { setMode(null); setError(""); }} className="w-full py-2 mt-2 text-xs font-bold" style={{ color: MUTED }}>Back</button>
          </div>
        )}

        {mode === "join" && (
          <div>
            <label className="text-xs font-bold mb-1.5 block uppercase tracking-wide" style={{ color: MUTED }}>Family code</label>
            <input value={inputCode} onChange={(e) => setInputCode(e.target.value.toUpperCase())} placeholder="e.g. K7M2XQ" maxLength={6}
              className="w-full rounded-xl p-3 text-center font-display font-bold text-xl tracking-[0.2em] mb-3 focus:outline-none" style={{ border: `2px solid ${LINE}` }} />
            {error && <p className="text-xs mb-3" style={{ color: "#B7551E" }}>{error}</p>}
            <button disabled={creating} onClick={joinFamily} className="w-full py-3.5 rounded-xl text-white font-display font-bold disabled:opacity-50" style={{ background: NAVY }}>
              {creating ? "Connecting…" : "Connect"}
            </button>
            <button onClick={() => { setMode(null); setError(""); }} className="w-full py-2 mt-2 text-xs font-bold" style={{ color: MUTED }}>Back</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   MAIN APP
   ============================================================ */
function App({ familyCode, onChangeFamily }) {
  const [tab, setTab] = useState("today");
  const [profiles, setProfiles] = useState(() => familyCode ? [] : localLoad("profiles", []));
  const [entriesByProfile, setEntriesByProfile] = useState(() => familyCode ? {} : localLoad("entries", {}));
  const [activeProfileId, setActiveProfileId] = useState(() => localLoad("activeProfileId", null));
  const [loaded, setLoaded] = useState(!familyCode);
  const [syncing, setSyncing] = useState(!!familyCode);
  const [selectedDate, setSelectedDate] = useState(todayKey());
  const [showAdd, setShowAdd] = useState(false);
  const [showImport, setShowImport] = useState(false);
  const [showProfileForm, setShowProfileForm] = useState(false);
  const [showProfileSwitcher, setShowProfileSwitcher] = useState(false);
  const [editingProfile, setEditingProfile] = useState(null);

  /* --- Firestore live sync --- */
  useEffect(() => {
    if (!familyCode) return;
    const unsub = fbDb.collection("families").doc(familyCode).onSnapshot((doc) => {
      const data = doc.data() || {};
      setProfiles(data.profiles || []);
      setEntriesByProfile(data.entries || {});
      setLoaded(true);
      setSyncing(false);
      if ((data.profiles || []).length === 0) setShowProfileForm(true);
    }, (err) => { console.error(err); setSyncing(false); setLoaded(true); });
    return () => unsub();
  }, [familyCode]);

  useEffect(() => {
    if (!familyCode && profiles.length === 0) setShowProfileForm(true);
  }, [familyCode]); // eslint-disable-line

  useEffect(() => { localSave("activeProfileId", activeProfileId); }, [activeProfileId]);
  useEffect(() => {
    if (!activeProfileId && profiles.length > 0) setActiveProfileId(profiles[0].id);
  }, [profiles, activeProfileId]);

  const persist = useCallback(async (nextProfiles, nextEntries) => {
    if (familyCode) {
      setSyncing(true);
      try {
        await fbDb.collection("families").doc(familyCode).set(
          { profiles: nextProfiles, entries: nextEntries, updatedAt: firebase.firestore.FieldValue.serverTimestamp() },
          { merge: true }
        );
      } catch (e) { console.error(e); }
      setSyncing(false);
    } else {
      localSave("profiles", nextProfiles);
      localSave("entries", nextEntries);
      setProfiles(nextProfiles);
      setEntriesByProfile(nextEntries);
    }
  }, [familyCode]);

  const activeProfile = profiles.find(p => p.id === activeProfileId) || null;
  const dayData = (entriesByProfile[activeProfileId] && entriesByProfile[activeProfileId][selectedDate]) || { tasks: [] };

  const addTasks = (newTasks, dateKey = selectedDate) => {
    if (!activeProfileId) return;
    const profileEntries = entriesByProfile[activeProfileId] || {};
    const existing = profileEntries[dateKey] || { tasks: [] };
    const nextEntries = {
      ...entriesByProfile,
      [activeProfileId]: { ...profileEntries, [dateKey]: { ...existing, tasks: [...existing.tasks, ...newTasks] } },
    };
    persist(profiles, nextEntries);
  };
  const toggleTask = (dateKey, id) => {
    const profileEntries = entriesByProfile[activeProfileId]; if (!profileEntries || !profileEntries[dateKey]) return;
    const tasks = profileEntries[dateKey].tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
    const nextEntries = { ...entriesByProfile, [activeProfileId]: { ...profileEntries, [dateKey]: { ...profileEntries[dateKey], tasks } } };
    persist(profiles, nextEntries);
  };
  const deleteTask = (dateKey, id) => {
    const profileEntries = entriesByProfile[activeProfileId]; if (!profileEntries || !profileEntries[dateKey]) return;
    const tasks = profileEntries[dateKey].tasks.filter(t => t.id !== id);
    const nextEntries = { ...entriesByProfile, [activeProfileId]: { ...profileEntries, [dateKey]: { ...profileEntries[dateKey], tasks } } };
    persist(profiles, nextEntries);
  };
  const saveProfile = (p) => {
    let next;
    if (editingProfile) {
      next = profiles.map(pr => pr.id === editingProfile.id ? { ...pr, ...p } : pr);
    } else {
      const newProfile = { id: uid(), color: PROFILE_COLORS[profiles.length % PROFILE_COLORS.length], ...p };
      next = [...profiles, newProfile];
      setActiveProfileId(newProfile.id);
    }
    persist(next, entriesByProfile);
    setShowProfileForm(false); setEditingProfile(null);
  };

  const historyDates = useMemo(() => {
    const profileEntries = entriesByProfile[activeProfileId] || {};
    return Object.keys(profileEntries).filter(k => (profileEntries[k].tasks || []).length > 0).sort((a, b) => (a < b ? 1 : -1));
  }, [entriesByProfile, activeProfileId]);

            {familyCode && (

          <NavBtn icon={<Icon.book size={20} />} label="Today" active={tab === "today"} onClick={() => setTab("today")} />
          <NavBtn icon={<Icon.calendar size={20} />} label="Diary" active={tab === "diary"} onClick={() => setTab("diary")} />

      {tab === "today" && activeProfile && (
        <button onClick={() => setShowAdd(true)}

          style={{ background: `linear-gradient(135deg, ${TEAL}, ${TEAL_DARK})`, boxShadow: "0 6px 16px rgba(30,143,115,0.4)" }} aria-label="Add task">

      {showAdd && <AddTaskSheet onClose={() => setShowAdd(false)} onSave={(task) => { addTasks([task]); setShowAdd(false); }} familyCode={familyCode} activeProfileId={activeProfileId} />}
      {showImport && <ImportSheet onClose={() => setShowImport(false)}

        <ProfileSheet profile={editingProfile} onClose={() => { if (profiles.length > 0) { setShowProfileForm(false); setEditingProfile(null); } }}

        <ProfileSwitcherSheet profiles={profiles} activeProfileId={activeProfileId}

          onClose={() => setShowProfileSwitcher(false)}

/* ============ Attachment upload + display ============ */
function AttachmentPicker({ familyCode, activeProfileId, attachment, onChange }) {
  const [uploading, setUploading] = useState(false);
  const [error, setError] = useState("");
  const inputRef = useRef(null);

  const handleFile = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setError("");
    if (file.size > MAX_FILE_MB * 1024 * 1024) { setError(`File is too big (max ${MAX_FILE_MB}MB).`); return; }

    if (!familyCode) {
      setError("Attachments need cloud sync to be set up (Firebase). This device is running in local-only mode.");
      return;
    }
    setUploading(true);
    try {
      const path = `families/${familyCode}/${activeProfileId}/${uid()}-${file.name}`;
      const ref = fbStorage.ref().child(path);
      await ref.put(file);
      const url = await ref.getDownloadURL();
      onChange({ name: file.name, url, type: file.type, size: file.size, kind: fileKind(file.type, file.name) });
    } catch (err) {
      console.error(err);
      setError("Upload failed. Check your Firebase Storage setup.");
    }
    setUploading(false);
  };

  if (attachment) {
    return (
      <div className="flex items-center gap-2 p-2.5 rounded-xl mb-4" style={{ background: fileBadgeColor(attachment.kind), border: `1px solid ${LINE}` }}>
        <span className="text-[10px] font-extrabold px-2 py-1 rounded-md bg-white shrink-0">{fileBadgeLabel(attachment.kind)}</span>
        <span className="text-xs flex-1 truncate" style={{ color: INK }}>{attachment.name}</span>
        <button onClick={() => onChange(null)} className="shrink-0"><Icon.x size={14} color={MUTED} /></button>
      </div>
    );
  }

  return (
    <div className="mb-4">
      <input ref={inputRef} type="file" accept={ACCEPTED_FILE_TYPES} onChange={handleFile} className="hidden" />
      <button onClick={() => inputRef.current?.click()} disabled={uploading}
        className="w-full py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 disabled:opacity-50"
        style={{ background: "#F5F8F8", color: NAVY, border: `1.5px dashed ${LINE}` }}>
        <Icon.paperclip size={15} /> {uploading ? "Uploading…" : "Attach photo, PDF, Word or Excel file"}
      </button>
      {error && <p className="text-[11px] mt-1.5" style={{ color: "#B7551E" }}>{error}</p>}
    </div>
  );
}

function AttachmentChip({ attachment }) {
  if (!attachment) return null;
  return (
    <a href={attachment.url} target="_blank" rel="noopener noreferrer"
      className="inline-flex items-center gap-1 mt-1.5 text-[11px] font-bold px-2 py-1 rounded-md"
      style={{ background: fileBadgeColor(attachment.kind), color: INK }}>
      <Icon.paperclip size={11} /> {attachment.name}
    </a>
  );
}

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <button onClick={() => setSelectedDate(addDays(selectedDate, -1))} className="w-10 h-10 rounded-full bg-white flex items-center justify-center active:scale-90" style={{ border: `1px solid ${LINE}` }}>
          <Icon.chevronL color={NAVY} />
        </button>
        <div className="text-center">
          <p className="font-display font-bold" style={{ color: NAVY }}>{prettyDate(selectedDate)}</p>
          {selectedDate !== todayKey() && (
            <button onClick={() => setSelectedDate(todayKey())} className="text-[11px] font-bold" style={{ color: TEAL }}>Jump to today</button>
          )}
        </div>
        <button onClick={() => setSelectedDate(addDays(selectedDate, 1))} className="w-10 h-10 rounded-full bg-white flex items-center justify-center active:scale-90" style={{ border: `1px solid ${LINE}` }}>
          <Icon.chevronR color={NAVY} />

          <div className="relative w-16 h-16 shrink-0">
            <svg viewBox="0 0 36 36" className="w-16 h-16 -rotate-90">
              <circle cx="18" cy="18" r="15.5" fill="none" stroke="#EAF0F0" strokeWidth="4.5" />
              <circle cx="18" cy="18" r="15.5" fill="none" stroke={TEAL} strokeWidth="4.5" strokeDasharray={`${pct}, 100`} strokeLinecap="round" style={{ transition: "stroke-dasharray .4s ease" }} />
            </svg>
            <span className="absolute inset-0 flex items-center justify-center font-display font-extrabold text-sm" style={{ color: NAVY }}>{pct}%</span>
          </div>
          <div>
            <p className="font-display font-bold text-sm" style={{ color: INK }}>{doneCount} of {tasks.length} complete</p>
            <p className="text-xs mt-0.5" style={{ color: MUTED }}>Tap a task to mark it done</p>

          <p className="font-display font-bold mt-3" style={{ color: NAVY }}>Nothing logged yet</p>

          <div className="flex gap-2 justify-center flex-wrap">
            <button onClick={onImport} className="px-4 py-2.5 rounded-full text-white text-sm font-bold flex items-center gap-1.5" style={{ background: NAVY }}>
              <Icon.clip size={15} /> Import
            </button>
            <button onClick={onAdd} className="px-4 py-2.5 rounded-full text-sm font-bold flex items-center gap-1.5" style={{ background: "#E1F3EC", color: TEAL_DARK }}>
              <Icon.plus size={15} /> Add task
            </button>
          </div>
        </div>
      ) : (
        <ul className="space-y-2.5">
          {tasks.map(t => {
            const s = styleFor(t.subject);
            return (
              <li key={t.id} className="bg-white rounded-xl px-3 py-3 flex items-start gap-3 transition hover:shadow-md" style={{ border: `1px solid ${LINE}` }}>
                <button onClick={() => onToggle(t.id)}
                  className="w-6 h-6 rounded-md flex items-center justify-center shrink-0 border-2 transition mt-0.5"
                  style={{ background: t.done ? TEAL : "#fff", borderColor: t.done ? TEAL : "#D5DEDF" }}>
                  {t.done && <Icon.check size={13} color="#fff" />}
                </button>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="text-[11px] font-bold px-2.5 py-1 rounded-full shrink-0" style={{ background: s.bg, color: s.fg }}>{t.subject}</span>
                    <span className={`text-sm ${t.done ? "line-through" : ""}`} style={{ color: t.done ? "#B7BFC1" : INK }}>{t.text}</span>
                  </div>
                  <AttachmentChip attachment={t.attachment} />

                <button onClick={() => onDelete(t.id)} className="shrink-0 active:scale-90 mt-0.5" style={{ color: "#C7CFD1" }}><Icon.trash size={16} /></button>

  return (

      <h2 className="font-display font-bold mb-3 text-lg" style={{ color: NAVY }}>Past entries</h2>

        </div>

        <ul className="space-y-2.5">
          {historyDates.map(k => {
            const d = entries[k]; const total = d.tasks.length; const done = d.tasks.filter(t => t.done).length;

function ImportSheet({ onClose, onConfirm, defaultDate }) {
  const [raw, setRaw] = useState("");
  const [parsed, setParsed] = useState(null);
  const [dateKey, setDateKey] = useState(defaultDate);
  const taRef = useRef(null);

  const doParse = () => { if (!raw.trim()) return; setParsed(parseWhatsAppText(raw).map(it => ({ ...it, id: uid(), include: true, done: false }))); };
  const toggleInclude = (id) => setParsed(parsed.map(p => p.id === id ? { ...p, include: !p.include } : p));
  const updateSubject = (id, subject) => setParsed(parsed.map(p => p.id === id ? { ...p, subject } : p));
  const handlePasteClick = async () => {
    try { const clip = await navigator.clipboard.readText(); if (clip) setRaw(clip); } catch { taRef.current?.focus(); }
  };

  return (
    <Sheet onClose={onClose} title="Import from WhatsApp">
      {!parsed ? (
        <>
          <p className="text-xs mb-2 leading-relaxed" style={{ color: MUTED }}>Open your class WhatsApp group, copy the homework/notice message, then paste it below.</p>
          <div className="flex justify-end mb-1">
            <button onClick={handlePasteClick} className="text-xs font-bold flex items-center gap-1" style={{ color: NAVY }}>
              <Icon.clip size={13} /> Paste from clipboard
            </button>
          </div>
          <textarea ref={taRef} value={raw} onChange={(e) => setRaw(e.target.value)} rows={7}
            placeholder={"Example:\nMaths: Do Ex 4.2 Q1-5\nHindi - व्याकरण पेज 20\nPTM on Friday 10am"}
            className="w-full rounded-xl p-3 text-sm mb-4 focus:outline-none" style={{ border: `2px solid ${LINE}` }} />
          <button disabled={!raw.trim()} onClick={doParse} className="w-full py-3.5 rounded-xl text-white font-display font-bold disabled:opacity-40" style={{ background: NAVY }}>
            Split into tasks
          </button>
        </>
      ) : (
        <>
          <p className="text-xs mb-3 leading-relaxed" style={{ color: MUTED }}>Review the tasks below — untick anything that isn't relevant, and fix a subject if needed.</p>
          <div className="mb-3">
            <label className="text-xs font-bold mb-1 block uppercase tracking-wide" style={{ color: MUTED }}>Add to date</label>
            <input type="date" value={dateKey} onChange={(e) => setDateKey(e.target.value)} className="rounded-lg px-3 py-2 text-sm" style={{ border: `2px solid ${LINE}` }} />
          </div>
          <ul className="space-y-2 mb-4 max-h-64 overflow-y-auto pr-1">
            {parsed.map(p => {
              const s = styleFor(p.subject);
              return (
                <li key={p.id} className="rounded-xl p-3 transition" style={{ border: `2px solid ${LINE}`, background: p.include ? "#fff" : "#F5F8F8", opacity: p.include ? 1 : 0.55 }}>
                  <div className="flex items-start gap-2">
                    <button onClick={() => toggleInclude(p.id)} className="w-5 h-5 rounded-md flex items-center justify-center shrink-0 mt-0.5 border-2"
                      style={{ background: p.include ? TEAL : "#fff", borderColor: p.include ? TEAL : "#D5DEDF" }}>
                      {p.include && <Icon.check size={11} color="#fff" />}
                    </button>
                    <div className="flex-1">
                      <select value={p.subject} onChange={(e) => updateSubject(p.id, e.target.value)}
                        className="text-[11px] font-bold rounded-md px-1.5 py-0.5 mb-1 border-0" style={{ background: s.bg, color: s.fg }}>
                        {["General", ...KNOWN_SUBJECTS].map(sub => <option key={sub} value={sub}>{sub}</option>)}
                      </select>
                      <p className="text-sm" style={{ color: INK }}>{p.text}</p>
                    </div>
                  </div>
                </li>
              );
            })}
          </ul>
          <div className="flex gap-2">
            <button onClick={() => setParsed(null)} className="flex-1 py-3.5 rounded-xl font-display font-bold" style={{ background: "#E1F3EC", color: TEAL_DARK }}>Back</button>
            <button onClick={() => onConfirm(parsed.filter(p => p.include).map(({ id, subject, text }) => ({ id, subject, text, done: false })), dateKey)}
              className="flex-[2] py-3.5 rounded-xl text-white font-display font-bold" style={{ background: NAVY }}>
              Add {parsed.filter(p => p.include).length} tasks
            </button>
          </div>
        </>
      )}
    </Sheet>
  );
}

    <Sheet onClose={onClose} title="Students">
      <ul className="space-y-2 mb-4">
        {profiles.map(p => (
          <li key={p.id} className="flex items-center gap-3 p-2.5 rounded-xl" style={{ border: `1px solid ${LINE}`, background: p.id === activeProfileId ? "#F5F8F8" : "#fff" }}>
            <button onClick={() => onSelect(p.id)} className="flex items-center gap-3 flex-1 text-left">
              <Avatar name={p.name} color={p.color} size={40} ring={p.id === activeProfileId} />
              <div>
                <p className="font-display font-bold text-sm" style={{ color: INK }}>{p.name}</p>
                <p className="text-xs" style={{ color: MUTED }}>Class {p.className}{p.section ? `-${p.section}` : ""}</p>
              </div>
            </button>
            <button onClick={() => onEdit(p)} className="text-xs font-bold px-2 py-1" style={{ color: TEAL_DARK }}>Edit</button>
          </li>
        ))}
      </ul>
      <button onClick={onAdd} className="w-full py-3 rounded-xl font-display font-bold flex items-center justify-center gap-1.5 mb-3" style={{ background: "#E1F3EC", color: TEAL_DARK }}>
        <Icon.plus size={16} /> Add another student
      </button>
      {familyCode && (
        <div className="pt-3" style={{ borderTop: `1px solid ${LINE}` }}>
          <p className="text-[11px] mb-2" style={{ color: MUTED }}>Family code: <span className="font-bold" style={{ color: INK }}>{familyCode}</span> — enter this on another device to see the same diary there.</p>
          <button onClick={onChangeFamily} className="text-[11px] font-bold" style={{ color: "#B7551E" }}>Disconnect this device</button>
        </div>
      )}
    </Sheet>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>

<script>
  const appSource = document.getElementById("app-source").textContent;
  const compiled = Babel.transform(appSource, {
    presets: [["react", { runtime: "classic" }]],
  }).code;
  const script = document.createElement("script");
  script.textContent = compiled;
  document.body.appendChild(script);
</script>
</body>
</html>
